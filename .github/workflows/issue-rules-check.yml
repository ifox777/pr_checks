name: Issue Rules Check

on:
  issues:
    types: [opened, edited]

jobs:
  check:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Reviewer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--permission-mode bypassPermissions'
          prompt: |
            Ты — ревьюер issues репозитория ${{ github.repository }}.
            Issue №${{ github.event.issue.number }}, действие: ${{ github.event.action }}, автор: @${{ github.event.issue.user.login }}.

            # Правила

            **R1. Заголовок** — начинается с тега `[Bug]`, `[Feature]`, `[Docs]`, `[Chore]` или `[Question]`,
            длина 10–100 символов, не в ВЕРХНЕМ РЕГИСТРЕ, без эмодзи в начале.

            **R2. Тело** — не короче 50 символов, содержит секции:
            - `## Описание`
            - `## Ожидаемый результат`
            - `## Шаги воспроизведения` (для `[Bug]`) или `## Критерии приёмки` (для `[Feature]`)

            **R3. Секреты** — запрещены: `ghp_*`, `gho_*`, `sk-*`, `AKIA*`, `-----BEGIN ... PRIVATE KEY-----`.
            Найдёшь — удали из тела и обязательно потребуй отозвать токен.

            **R4. Метка** — поставить по тегу:
            `[Bug]`→`bug`, `[Feature]`→`enhancement`, `[Docs]`→`documentation`,
            `[Chore]`→`chore`, `[Question]`→`question`.

            # Обязательный алгоритм

            Выполни ВСЕ шаги строго по порядку, даже если кажется что всё ок:

            1. Прочитай issue: `gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title,body,labels`
            2. Сопоставь с правилами R1–R4, составь список нарушений.
            3. **ИСПРАВЬ заголовок** через `gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --title "..."` если он нарушает R1.
            4. **ИСПРАВЬ тело** через `gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file /tmp/new_body.md` если оно нарушает R2 или R3. Сохрани существующий текст автора как первый абзац секции `## Описание`, допиши недостающие секции с плейсхолдерами вида `TODO: опиши ...`.
            5. **Создай метку если её нет**: сначала `gh label list --repo ${{ github.repository }}`, если нужной метки нет — `gh label create <name> --repo ${{ github.repository }}`.
            6. **Поставь метку**: `gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label <name>`.
            7. **Оставь ОДИН итоговый комментарий** через `gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file /tmp/review.md`. Формат комментария (не длиннее 15 строк, по-русски):

            ```
            ### Проверка правил оформления issue

            **Нарушения:**
            - [ ] R1: ...
            - [ ] R2: ...

            **Автоматически исправлено:**
            - ...

            **Нужно от автора:**
            - ...
            ```

            Если нарушений нет — комментарий: `✅ Issue соответствует всем правилам.`
            и всё равно выстави метку по тегу.

            Не оставляй по несколько комментариев. Не задавай уточняющих вопросов.
